<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BW6YRG2MGX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BW6YRG2MGX');
  </script>
  <!--META-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>" />
</head>
<body>

  <header class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-star">★</span>
        <span class="logo-text">AMERICAN<em>PRIDE</em></span>
      </a>
      <nav class="nav-links">
        <a href="/#shop">Shop</a>
        <a href="/blog" style="color:var(--white)">Blog</a>
        <a href="/#reviews">Reviews</a>
      </nav>
      <button class="cart-btn" id="cart-btn" aria-label="Open cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </header>

  <section class="blog-hero">
    <div class="section-head">
      <span class="section-tag">THE PATRIOT BLOG</span>
      <h2>Stories for <span class="text-gradient">True Patriots</span></h2>
      <p>Guides, stories and news from the American Pride Store.</p>
    </div>
  </section>

  <main class="blog-wrap">
    <div class="blog-grid" id="blog-grid"><p class="blog-loading">Loading…</p></div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">© 2026 American Pride Store. All rights reserved. 🇺🇸</div>
  </footer>

  <!-- Cart drawer (shared) -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer" aria-label="Shopping cart">
    <div class="cart-head">
      <h3>Your Cart <span id="cart-head-count"></span></h3>
      <button class="cart-close" id="cart-close" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-foot">
      <div class="cart-total-row">
        <span>Total</span>
        <span class="cart-total" id="cart-total">$0.00</span>
      </div>
      <p class="cart-note">Shipping &amp; taxes calculated at checkout</p>
      <button class="btn btn-primary btn-checkout" id="checkout-btn">
        <span id="checkout-label">SECURE CHECKOUT 🔒</span>
      </button>
      <p class="cart-error" id="cart-error"></p>
    </div>
  </aside>

  <div class="toast" id="toast">Added to cart! 🇺🇸</div>

  <script src="/app.js"></script>
  <script>
  (async function () {
    const grid = document.getElementById('blog-grid');
    try {
      const posts = await (await fetch('/api/posts')).json();
      if (!posts.length) {
        grid.innerHTML = '<p class="blog-loading">No articles yet — check back soon, patriot! 🇺🇸</p>';
        return;
      }
      const ref = (window.getRef && getRef()) || '';
      const q = ref ? '?ref=' + encodeURIComponent(ref) : '';
      grid.innerHTML = posts.map((p, i) => `
        <a class="post-card reveal ${i === 0 ? 'post-card-hero' : ''}" href="/blog/${esc(p.slug)}${q}">
          <div class="post-cover">${p.cover ? `<img src="${esc(p.cover)}" alt="${esc(p.title)}" loading="lazy" />` : '<span class="post-cover-fallback">★</span>'}</div>
          <div class="post-info">
            <span class="post-date">${new Date(p.created_at.replace(' ', 'T') + 'Z').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
            <h3>${esc(p.title)}</h3>
            ${p.excerpt ? `<p>${esc(p.excerpt)}</p>` : ''}
            <span class="post-more">Read article →</span>
          </div>
        </a>`).join('');
      if (typeof observeReveals === 'function') observeReveals();
    } catch {
      grid.innerHTML = '<p class="blog-loading">Could not load the blog.</p>';
    }
  })();
  </script>
</body>
</html>
