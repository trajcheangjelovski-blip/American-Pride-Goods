<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Canceled — American Pride Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>" />
  <style>
    .result-page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(224, 22, 43, 0.12), transparent),
        var(--navy-950);
    }
    .result-card {
      max-width: 520px;
      padding: 60px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to { opacity: 1; transform: none; }
    }
    .result-icon { font-size: 4.5rem; display: block; margin-bottom: 20px; }
    .result-card h1 { font-family: var(--font-display); font-size: 1.9rem; margin-bottom: 14px; }
    .result-card p { color: var(--grey-300); line-height: 1.7; margin-bottom: 32px; }
  </style>
</head>
<body>
  <main class="result-page">
    <div class="result-card">
      <span class="result-icon">🛒</span>
      <h1>CHECKOUT <span class="text-gradient">CANCELED</span></h1>
      <p>No worries — your cart is saved and waiting for you. Come back anytime to complete your order.</p>
      <a href="/" class="btn btn-primary">RETURN TO STORE <span class="btn-arrow">→</span></a>
    </div>
  </main>
</body>
</html>
