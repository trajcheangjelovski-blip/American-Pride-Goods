<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — American Pride Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>" />
</head>
<body>

  <header class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-star">★</span>
        <span class="logo-text">AMERICAN<em>PRIDE</em></span>
      </a>
      <nav class="nav-links">
        <a href="/#shop">Shop</a>
        <a href="/#about">Why Us</a>
        <a href="/#reviews">Reviews</a>
      </nav>
      <button class="cart-btn" id="cart-btn" aria-label="Open cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </header>

  <main class="pdp" id="pdp">
    <div class="pdp-loading" id="pdp-loading">Loading…</div>
  </main>

  <section class="pdp-related" id="pdp-related" style="display:none">
    <div class="section-head reveal">
      <span class="section-tag">YOU MAY ALSO LIKE</span>
      <h2>More <span class="text-gradient">Patriot Gear</span></h2>
    </div>
    <div class="product-grid" id="related-grid"></div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">© 2026 American Pride Store. All rights reserved. 🇺🇸</div>
  </footer>

  <!-- Cart drawer (shared) -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer" aria-label="Shopping cart">
    <div class="cart-head">
      <h3>Your Cart <span id="cart-head-count"></span></h3>
      <button class="cart-close" id="cart-close" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-foot">
      <div class="cart-total-row">
        <span>Total</span>
        <span class="cart-total" id="cart-total">$0.00</span>
      </div>
      <p class="cart-note">Shipping &amp; taxes calculated at checkout</p>
      <button class="btn btn-primary btn-checkout" id="checkout-btn">
        <span id="checkout-label">SECURE CHECKOUT 🔒</span>
      </button>
      <p class="cart-error" id="cart-error"></p>
    </div>
  </aside>

  <div class="toast" id="toast">Added to cart! 🇺🇸</div>

  <!-- Photo zoom lightbox -->
  <div class="lightbox" id="lightbox" aria-label="Zoomed photo">
    <button class="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script src="/app.js"></script>
  <script>
  (async function () {
    const slug = location.pathname.split('/').pop();
    const main = document.getElementById('pdp');
    try {
      const ref = (window.getRef && getRef()) || '';
      const res = await fetch('/api/product/' + encodeURIComponent(slug) + (ref ? '?ref=' + encodeURIComponent(ref) : ''));
      if (!res.ok) throw new Error('not found');
      const { product: p, related } = await res.json();

      document.title = p.name + ' — American Pride Store';
      const gallery = [p.image, ...(p.images || [])].filter(Boolean)
        .filter((src, i, arr) => arr.indexOf(src) === i);

      /* option groups -> selectors */
      const optionsHtml = (p.options || []).length ? `
        <div class="pdp-options">
          ${p.options.map((g, gi) => `
            <div class="pdp-opt-group" data-gi="${gi}" data-name="${esc(g.name)}" data-type="${g.type}">
              <span class="pdp-opt-name">${esc(g.name)}${g.type === 'select' ? ' <span class="req">*</span>' : ' <span style="color:var(--grey-400);font-weight:600;text-transform:none;letter-spacing:0">(optional)</span>'}</span>
              <div class="pdp-opt-choices">
                ${g.choices.map((c, ci) => `
                  <button type="button" class="pdp-choice ${g.type === 'addon' ? 'addon' : ''} ${g.type === 'select' && ci === 0 ? 'selected' : ''}" data-gi="${gi}" data-label="${esc(c.label)}">
                    ${esc(c.label)}${c.price ? ` <span class="delta">+$${(c.price / 100).toFixed(2)}</span>` : ''}
                  </button>`).join('')}
              </div>
            </div>`).join('')}
        </div>` : '';
      main.innerHTML = `
        <nav class="pdp-crumbs">
          <a href="/">Home</a> <span>›</span>
          <a href="/#shop">Shop</a> <span>›</span>
          ${p.category_name ? `<a href="/#shop">${esc(p.category_name)}</a> <span>›</span>` : ''}
          <b>${esc(p.name)}</b>
        </nav>
        <div class="pdp-grid">
          <div class="pdp-media">
            ${p.badge ? `<span class="product-badge ${p.badge === 'LIMITED' ? 'gold' : ''}">${esc(p.badge)}</span>` : ''}
            <div class="pdp-img-wrap" id="pdp-zoom" title="Click to zoom">
              <img id="pdp-main-img" src="${esc(gallery[0])}" alt="${esc(p.name)}" />
              <span class="pdp-zoom-hint">🔍</span>
            </div>
            ${gallery.length > 1 ? `
            <div class="pdp-thumbs">
              ${gallery.map((src, i) => `
                <button class="pdp-thumb ${i === 0 ? 'active' : ''}" data-src="${esc(src)}" aria-label="Photo ${i + 1}">
                  <img src="${esc(src)}" alt="" loading="lazy" />
                </button>`).join('')}
            </div>` : ''}
          </div>
          <div class="pdp-info">
            ${p.category_name ? `<span class="pdp-cat">${esc(p.category_name)}</span>` : ''}
            <h1 class="pdp-title">${esc(p.name)}</h1>
            <div class="pdp-rating">★★★★★ <span>4.9 · verified patriots</span></div>
            <div class="pdp-price" id="pdp-price"></div>
            <p class="pdp-desc">${esc(p.description)}</p>
            ${optionsHtml}
            <div class="pdp-buy">
              <div class="qty-controls pdp-qty">
                <button class="qty-btn" id="qty-minus">−</button>
                <span class="qty-val" id="pdp-qty">1</span>
                <button class="qty-btn" id="qty-plus">+</button>
              </div>
              <button class="btn btn-primary pdp-add" id="pdp-add">ADD TO CART <span class="btn-arrow">→</span></button>
              <button class="btn btn-gold pdp-buy-now" id="pdp-buy-now"><span id="buy-now-label">BUY NOW ${window.LOCK || ''}</span></button>
            </div>
            <p class="cart-error" id="pdp-error"></p>
            <div class="pdp-trust">
              <span>🇺🇸 Patriot approved</span>
              <span>🚚 Delivery in 7–12 days</span>
              <span>🔒 Secure checkout</span>
              <span>↩️ 30-day returns</span>
            </div>
            <div class="pdp-long">${p.long_description ? esc(p.long_description).replace(/\n\n/g, '</p><p>').replace(/^/, '<p>') + '</p>' : ''}</div>
          </div>
        </div>`;

      /* selected options state (defaults: first choice of each select group) */
      const selected = {};
      (p.options || []).forEach((g) => {
        if (g.type === 'select' && g.choices[0]) selected[g.name] = g.choices[0].label;
        else selected[g.name] = [];
      });

      /* quantity + live price (base/sale + option deltas) × qty */
      let qty = 1;
      const qtyEl = document.getElementById('pdp-qty');
      const priceEl = document.getElementById('pdp-price');
      const updatePrice = () => {
        const unit = window.unitPrice(p, selected);
        let html = '$' + ((unit * qty) / 100).toFixed(2);
        if (window.onSale(p) && !hasOptionDeltas()) {
          html += `<span class="pdp-price-old">$${(p.price / 100).toFixed(2)}</span>`;
          const pct = Math.round((1 - p.sale_price / p.price) * 100);
          html += `<span class="pdp-save">SAVE ${pct}%</span>`;
        }
        if (qty > 1) html += ` <span class="pdp-unit">${qty} × $${(unit / 100).toFixed(2)}</span>`;
        priceEl.innerHTML = html;
      };
      const hasOptionDeltas = () => window.unitPrice(p, selected) !== window.effPrice(p);

      /* wire option selectors */
      document.querySelectorAll('.pdp-opt-group').forEach((groupEl) => {
        const gi = Number(groupEl.dataset.gi);
        const group = p.options[gi];
        groupEl.querySelectorAll('.pdp-choice').forEach((btn) => {
          btn.addEventListener('click', () => {
            const label = btn.dataset.label;
            if (group.type === 'addon') {
              const arr = selected[group.name];
              const i = arr.indexOf(label);
              if (i > -1) { arr.splice(i, 1); btn.classList.remove('selected'); }
              else { arr.push(label); btn.classList.add('selected'); }
            } else {
              selected[group.name] = label;
              groupEl.querySelectorAll('.pdp-choice').forEach((b) => b.classList.toggle('selected', b === btn));
            }
            updatePrice();
          });
        });
      });

      updatePrice();
      document.getElementById('qty-minus').onclick = () => { qty = Math.max(1, qty - 1); qtyEl.textContent = qty; updatePrice(); };
      document.getElementById('qty-plus').onclick = () => { qty = Math.min(99, qty + 1); qtyEl.textContent = qty; updatePrice(); };
      document.getElementById('pdp-add').onclick = () => window.addToCart(p.slug, qty, cloneSelected());

      function cloneSelected() {
        const out = {};
        Object.keys(selected).forEach((k) => { out[k] = Array.isArray(selected[k]) ? [...selected[k]] : selected[k]; });
        return out;
      }

      /* buy now — straight to Stripe checkout with this product + options */
      const buyBtn = document.getElementById('pdp-buy-now');
      const buyLabel = document.getElementById('buy-now-label');
      const errBox = document.getElementById('pdp-error');
      buyBtn.onclick = async () => {
        errBox.textContent = '';
        buyBtn.disabled = true;
        buyLabel.textContent = 'REDIRECTING…';
        try {
          const res = await fetch('/api/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items: [{ id: p.slug, quantity: qty, options: cloneSelected() }], ref: window.getRef ? getRef() : '' })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Checkout failed');
          window.location.href = data.url;
        } catch (err) {
          errBox.textContent = err.message;
          buyBtn.disabled = false;
          buyLabel.innerHTML = 'BUY NOW ' + (window.LOCK || '');
        }
      };

      /* gallery thumbnails */
      const mainImg = document.getElementById('pdp-main-img');
      document.querySelectorAll('.pdp-thumb').forEach((thumb) => {
        thumb.addEventListener('click', () => {
          mainImg.src = thumb.dataset.src;
          document.querySelectorAll('.pdp-thumb').forEach((t) => t.classList.toggle('active', t === thumb));
        });
      });

      /* click-to-zoom lightbox */
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      document.getElementById('pdp-zoom').addEventListener('click', () => {
        lightboxImg.src = mainImg.src;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
      const closeLightbox = () => {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      };
      lightbox.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

      if (related && related.length) {
        document.getElementById('pdp-related').style.display = '';
        document.getElementById('related-grid').innerHTML = related.map((r) => {
          const rSale = window.onSale(r);
          const priceHtml = rSale
            ? `<span class="product-price">$${(r.sale_price / 100).toFixed(2)}</span> <span class="product-price-old">$${(r.price / 100).toFixed(2)}</span>`
            : `<span class="product-price">$${(r.price / 100).toFixed(2)}</span>`;
          return `
          <article class="product-card">
            ${rSale ? `<span class="product-badge gold">-${Math.round((1 - r.sale_price / r.price) * 100)}%</span>` : (r.badge ? `<span class="product-badge ${r.badge === 'LIMITED' ? 'gold' : ''}">${esc(r.badge)}</span>` : '')}
            <a class="card-link" href="/product/${esc(r.slug)}">
              <div class="product-img"><img src="${esc(r.image)}" alt="${esc(r.name)}" loading="lazy" /></div>
            </a>
            <div class="product-info">
              <h3 class="product-name"><a class="card-link" href="/product/${esc(r.slug)}">${esc(r.name)}</a></h3>
              <div class="product-foot">
                <div class="price-wrap">${priceHtml}</div>
                <a class="add-btn" href="/product/${esc(r.slug)}">VIEW</a>
              </div>
            </div>
          </article>`;
        }).join('');
      }
    } catch {
      main.innerHTML = `<div class="pdp-loading">Product not found. <a href="/#shop" style="color:var(--gold-300)">Back to the shop →</a></div>`;
    }
  })();
  </script>
</body>
</html>
