<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BW6YRG2MGX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BW6YRG2MGX');
  </script>
  <title>Order Confirmed — American Pride Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>" />
  <style>
    .result-page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(30, 63, 160, 0.2), transparent),
        var(--navy-950);
    }
    .result-card {
      max-width: 520px;
      padding: 60px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to { opacity: 1; transform: none; }
    }
    .result-icon {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 20px;
      animation: bounce 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .result-card h1 { font-family: var(--font-display); font-size: 1.9rem; margin-bottom: 14px; }
    .result-card p { color: var(--grey-300); line-height: 1.7; margin-bottom: 32px; }
  </style>
</head>
<body>
  <main class="result-page">
    <div class="result-card">
      <span class="result-icon">🎉</span>
      <h1>ORDER <span class="text-gradient">CONFIRMED!</span></h1>
      <p>Thank you, patriot! Your payment was successful and your order is being prepared. You'll receive a confirmation email from Stripe shortly. 🇺🇸</p>
      <a href="/" class="btn btn-primary">BACK TO THE STORE <span class="btn-arrow">→</span></a>
    </div>
  </main>
  <script>
    localStorage.removeItem('ap_cart');
    const sid = new URLSearchParams(location.search).get('session_id');
    if (sid) {
      fetch('/api/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sid })
      }).catch(() => {});
    }
  </script>
</body>
</html>
